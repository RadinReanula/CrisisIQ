[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "vite"
  port = 8888
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai", "@supabase/supabase-js"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
